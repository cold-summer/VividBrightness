name: Bug report
description: Report reproducible behavior in VividBrightness
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thank you for taking the time to report a problem. Do not include private information or credentials.
  - type: input
    id: version
    attributes:
      label: VividBrightness version or commit
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 14.6
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac and display models
      placeholder: 14-inch MacBook Pro (M3 Pro), built-in Liquid Retina XDR
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Describe the exact controls and boost level used.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or test output
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed private information from logs and screenshots.
          required: true
